name: Filter Tables

on:
  push:
    paths:
      - "full/*.md"

jobs:
  filter:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate filtered tables
        run: python ci-filter.py

      - name: Commit filtered files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./*.md
          git diff --staged --quiet || git commit -m "filter lasered Tz [skip ci]"
          git push
